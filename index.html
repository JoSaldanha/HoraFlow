<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Hora App</title>
</head>
<body>
  <main class="app-container">

    <div class="switch-wrapper">
      <label class="switch" for="switch-sun-moon">
        <input type="checkbox" id="switch-sun-moon">
        <span class="slider"></span>
      </label>
    </div>

    <div class="tasks">
      <div class="task-input">
        <input type="text" id="newTask" placeholder="New Task">
        <button onclick="addTask()">Add</button>
      </div>
      <ul id="taskList"></ul>
    </div>

    <div id="pomodoro-container">
      <div class="container progress-container">
        <h2>Hours per day</h2>
        <canvas id="weeklyChart"></canvas>
      </div>
      <div id="pomodoro-app" class="container">
        <div class="modes">
          <button class="mode" onclick="setMode('pomodoro')">Pomodoro</button>
          <button class="mode" onclick="setMode('short')">Short Break</button>
          <button class="mode" onclick="setMode('long')">Long Break</button>
        </div>
  
        <h1>🍅 Pomodoro</h1>
        <div id="timer">25:00</div>
          
        <div>
          <button class="start" onclick="startTimer()">Start</button>
          <button class="pause" onclick="pauseTimer()">Pause</button>
          <button class="reset" onclick="resetTimer()">Reset</button>
        </div>
        <div class="cycle-info">
          <p>Completed Pomodoros: <span id="pomodoroCount">0</span> / 4</p>
          <p>Completed Cycles: <span id="cycleCount">0</span></p>
        </div>
      </div>
    </div>
  </main>
  <script defer src="js/app.js"></script>
</body>
</html>
