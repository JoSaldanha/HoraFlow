<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=restart_alt" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Hora App</title>
</head>
<body>
  <main class="app-container">

    <div class="switch-wrapper">
      <label class="switch" for="switch-sun-moon">
        <input type="checkbox" id="switch-sun-moon">
        <span class="slider"></span>
      </label>
    </div>

    <div class="tasks">
      <div class="task-input">
        <input type="text" id="newTask" placeholder="Add a new task...">
        <button onclick="addTask()">Add</button>
      </div>
      <ul id="taskList"></ul>
    </div>

    <div id="pomodoro-container">
      <div class="container progress-container">
        <h2>Weekly Focus Hours</h2>
        <canvas id="weeklyChart"></canvas>
      </div>
      <div id="pomodoro-app" class="container">
        <div class="modes">
          <button class="mode" data-mode="pomodoro" onclick="setMode('pomodoro')">Pomodoro</button>
          <button class="mode" data-mode="short_break" onclick="setMode('short_break')">Short Break</button>
          <button class="mode" data-mode="long_break" onclick="setMode('long_break')">Long Break</button>
        </div>
  
        <div id="timer">25:00</div>

        <div id="play-buttons">
          <div id="actions">
            <button class="btn-flip btn-playpause click-btn" data-front="Front" data-back="Back">
              <span class="front">Start</span>
              <span class="back">Pause</span>
            </button>
    
            <span class="material-symbols-outlined" onclick="resetTimer()">
            restart_alt
            </span>
          </div>
        </div>

        <div class="cycle-info">
          <p>Count: <span id="pomodoroCount">0</span> / 4 🍅</p>
          <p>Completed Cycles: <span id="cycleCount">0</span></p>
        </div>
      </div>
    </div>
  </main>
  <script defer src="js/app.js"></script>
</body>
</html>
